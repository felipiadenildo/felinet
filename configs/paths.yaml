# ============================================================
# paths.yaml - Mapeamento de caminhos por perfil de execucao
# ============================================================
# Carregado por felinet.config.carregar_perfil()
# Selecionar perfil via variavel de ambiente FELINET_PERFIL ou
# argumento --perfil dos comandos CLI.
#
# Convencao: todos os paths sao RELATIVOS a raiz do projeto.
# Os datasets brutos pesados (PetFace, LILA-BC, Campus 2) ficam
# fora do repositorio e sao acessados via symlinks em data/raw/.
# Ver docs/runbooks/conectar_ssd_symlinks.md.
#
# Saidas de execucao (runs/) sao escritas em diretorio determinado
# pelos parametros do comando (modo, fonte, protocolo, gitsha).
# Ver docs/arquitetura/layout_runs.md.
# ============================================================

# ----------------------------------------------------------
# FONTES - Catalogo de pontos de montagem
# ----------------------------------------------------------
# Cada fonte e um identificador estavel que aparece nos comandos
# (--fonte kaggle_cats) e nos manifests de runs. O caminho aponta
# para o ponto de montagem (geralmente symlink em data/raw/).
# Adicionar nova fonte: registrar aqui + criar symlink em data/raw/.
# ----------------------------------------------------------

fontes:
  # ----- Operacionais (camera-trap, cascata I->IV) -----
  campus2_2025:   data/raw/camera_trap/campus2_2025   # camera-trap real do Campus 2
  lila_ena24:     data/raw/camera_trap/lila_ena24     # LILA-BC ENA24 (camera-trap publico)
  kaggle_cats:    data/raw/camera_trap/kaggle_cats    # samuelayman/cat-dataset (smoke test)
  dev_placeholders: data/dev/pipeline/01_brutas       # 5 placeholders sinteticos versionados

  # ----- Metodologicas (Re-ID, identidade rotulada) -----
  petface:        data/raw/reid/petface               # PetFace oficial (mapooon/PetFace)
  petface_mini:   data/dev/reid_mini                  # subset PetFace (smoke Re-ID)

  felidae:
      raiz: data/raw/camera_trap/felidae
      tipo: operacional

# ----------------------------------------------------------
# RUNS - Raiz dos diretorios de execucao
# ----------------------------------------------------------
# Cada run grava em runs/<modo>/<fonte>/<perfil>/<protocolo|_>/<gitsha>[__<tag>]/
# Ver docs/arquitetura/layout_runs.md para o esquema completo.
# ----------------------------------------------------------
raiz_runs: runs

# ----------------------------------------------------------
# ARTIFACTS - Saidas para a monografia (versionado no git)
# ----------------------------------------------------------
artifacts_figuras_raiz: artifacts/figuras
artifacts_tabelas_raiz: artifacts/tabelas

# ----------------------------------------------------------
# PERFIS - Defaults por perfil (fonte primaria, recursos)
# ----------------------------------------------------------
# Os perfis definem apenas os DEFAULTS quando o comando nao
# especifica --fonte. As saidas vao sempre para runs/, nao
# para caminhos fixos como antes.
# ----------------------------------------------------------
perfis:

  # ----------------------------------------------------------
  # DEV - Smoke test, CI, demonstracao
  # ----------------------------------------------------------
  # Tudo cabe no repositorio. Roda em < 1 min sem GPU.
  # Datasets externos opcionais via symlinks em data/raw/.
  # ----------------------------------------------------------
  dev:
    raw_camera_trap:    data/dev/pipeline/01_brutas      # default operacional
    raw_petface:        data/dev/reid_mini               # default metodologico
    interim:            data/dev/interim                 # caches transitorios
    processed:          data/dev/processed               # legado (compat)
    artifacts_figuras:  artifacts/figuras
    artifacts_tabelas:  artifacts/tabelas
    # Saidas legacy (mantidas para compat; novo codigo usa runs/)
    saida_manifesto:           data/dev/pipeline/02_manifesto
    saida_deteccoes:           data/dev/pipeline/03_deteccoes
    saida_classificacoes:      data/dev/pipeline/04_classificacoes
    saida_crops:               data/dev/pipeline/05_crops_felis_catus
    anotacao_identidade:       data/dev/pipeline/06_anotacao_identidade.json
    saida_embeddings:          data/dev/pipeline/07_embeddings.npz
    saida_avaliacao_pipeline:  data/dev/pipeline/08_avaliacao_pipeline.json
    # Fonte default por modo (usado quando --fonte nao for passado)
    fonte_default_operacional: dev_placeholders
    fonte_default_metodologico: petface_mini

  # ----------------------------------------------------------
  # PROD - Execucao oficial (geracao de metricas da monografia)
  # ----------------------------------------------------------
  # Datasets via symlinks ao SSD externo.
  # ----------------------------------------------------------
  prod:
    raw_camera_trap:    data/raw/camera_trap/campus2_2025
    raw_petface:        data/raw/reid/petface
    raw_campus2:        data/raw/camera_trap/campus2_2025
    interim:            data/interim
    processed:          data/processed
    artifacts_figuras:  artifacts/figuras
    artifacts_tabelas:  artifacts/tabelas
    # Saidas legacy (mantidas para compat)
    saida_manifesto:           data/processed
    saida_deteccoes:           data/interim
    saida_classificacoes:      data/interim
    saida_crops:               data/interim/crops_felis_catus
    anotacao_identidade:       data/processed/anotacao_identidade.json
    saida_embeddings:          data/interim
    saida_avaliacao_pipeline:  data/processed
    fonte_default_operacional: campus2_2025
    fonte_default_metodologico: petface
